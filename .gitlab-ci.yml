# WHITE-HAT-STOAT GitLab CI/CD Pipeline
# Version: 1.0.0

stages:
  - build
  - test
  - security
  - package
  - deploy
  - monitor

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA
  PYTHON_VERSION: "3.10"
  PACKAGE_REGISTRY: $CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/pypi
  SONAR_HOST_URL: https://sonarqube.example.com
  SONAR_TOKEN: ${SONAR_TOKEN}
  SECURE_FILES_PATH: .secure_files

# Global cache for dependencies
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .venv/
    - .cache/pip/
    - node_modules/
    - vendor/

# =====================
# BUILD STAGE
# =====================

build:python:
  stage: build
  image: python:${PYTHON_VERSION}
  before_script:
    - python -V
    - pip install --upgrade pip setuptools wheel
    - pip install virtualenv
  script:
    - virtualenv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pip install -e .
    - python -c "import white_hat_stoat; print('✅ Import successful')"
  artifacts:
    paths:
      - .venv/
      - dist/
    expire_in: 1 week
  only:
    - main
    - develop
    - merge_requests

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache python3 py3-pip
    - pip install docker-compose
  script:
    - echo "Building Docker image..."
    - docker build -t ${DOCKER_IMAGE}:${DOCKER_TAG} .
    - docker tag ${DOCKER_IMAGE}:${DOCKER_TAG} ${DOCKER_IMAGE}:latest
    - docker push ${DOCKER_IMAGE}:${DOCKER_TAG}
    - docker push ${DOCKER_IMAGE}:latest
  artifacts:
    paths:
      - docker-images/
  only:
    - main

# =====================
# TEST STAGE
# =====================

test:unit:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pip install -e .
  script:
    - pytest tests/unit/ -v --cov=white_hat_stoat --cov-report=term --cov-report=html --cov-report=xml
  coverage: '/TOTAL.+?([0-9]{1,3}%)/'
  artifacts:
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 1 week
  only:
    - main
    - develop
    - merge_requests

test:integration:
  stage: test
  image: python:${PYTHON_VERSION}
  services:
    - postgres:15
    - redis:7
  variables:
    POSTGRES_DB: test_stoat
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    REDIS_PASSWORD: test_redis
  before_script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pip install -e .
  script:
    - pytest tests/integration/ -v --cov=white_hat_stoat --cov-append
  artifacts:
    paths:
      - coverage.xml
    expire_in: 1 week
  only:
    - main
    - develop

test:performance:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install -r requirements.txt
    - pip install -r requirements-dev.txt
    - pip install locust
  script:
    - locust -f tests/performance/locustfile.py --headless -u 100 -r 10 --run-time 5m --host http://localhost:5000
    - echo "Performance test completed"
  artifacts:
    paths:
      - performance-reports/
    expire_in: 1 week
  only:
    - main
  allow_failure: true

# =====================
# SECURITY STAGE
# =====================

security:scan:
  stage: security
  image: aquasec/trivy:latest
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip install safety bandit
  script:
    # Scan dependencies
    - safety check -r requirements.txt
    - bandit -r white_hat_stoat/ -f json -o bandit-report.json
    
    # Scan Docker image
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed ${DOCKER_IMAGE}:${DOCKER_TAG}
    
    # Scan file system
    - trivy fs --severity HIGH,CRITICAL --ignore-unfixed .
  artifacts:
    paths:
      - bandit-report.json
      - trivy-reports/
    expire_in: 1 month
    reports:
      security: bandit-report.json
  only:
    - main
    - develop

security:static-analysis:
  stage: security
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner 
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.sources=white_hat_stoat
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.python.coverage.reportPaths=coverage.xml
      -Dsonar.exclusions=**/tests/**,**/docs/**
  artifacts:
    paths:
      - .scannerwork/
    expire_in: 1 week
  only:
    - main

security:container-scan:
  stage: security
  image: anchore/scan-action:latest
  script:
    - scan-action -v /var/run/docker.sock ${DOCKER_IMAGE}:${DOCKER_TAG}
  artifacts:
    paths:
      - anchore-reports/
    expire_in: 1 month
  only:
    - main

# =====================
# PACKAGE STAGE
# =====================

package:pypi:
  stage: package
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install build twine
  script:
    - python -m build
    - twine upload --repository-url ${PACKAGE_REGISTRY} -u gitlab-ci-token -p ${CI_JOB_TOKEN} dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 year
  only:
    - tags

package:binaries:
  stage: package
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install pyinstaller
    - apt-get update && apt-get install -y upx-ucl
  script:
    - pyinstaller --onefile --noconsole --name white-hat-stoat white_hat_stoat.py
    - pyinstaller --onefile --console --name stoat-cli white_hat_stoat.py
    - mkdir -p dist/binaries/
    - cp dist/white-hat-stoat dist/binaries/
    - cp dist/stoat-cli dist/binaries/
  artifacts:
    paths:
      - dist/binaries/
    expire_in: 1 month
  only:
    - tags

# =====================
# DEPLOY STAGE
# =====================

deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to staging..."
    - rsync -avz --delete --exclude='.git' --exclude='.venv' --exclude='__pycache__' ./ $SSH_USER@$STAGING_HOST:/opt/white-hat-stoat/
    - ssh $SSH_USER@$STAGING_HOST "cd /opt/white-hat-stoat && docker-compose -f docker-compose.staging.yml up -d"
  environment:
    name: staging
    url: http://staging.example.com
  only:
    - develop

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to production..."
    - ssh $SSH_USER@$PRODUCTION_HOST "cd /opt/white-hat-stoat && docker pull ${DOCKER_IMAGE}:${DOCKER_TAG} && docker-compose -f docker-compose.prod.yml up -d"
  environment:
    name: production
    url: https://white-hat-stoat.example.com
  only:
    - main
  when: manual

# =====================
# MONITOR STAGE
# =====================

monitor:health:
  stage: monitor
  image: appropriate/curl:latest
  script:
    - echo "Checking service health..."
    - sleep 10
    - curl -f http://staging.example.com/health || exit 1
    - curl -f http://staging.example.com/status || exit 1
    - echo "✅ Health check passed"
  environment:
    name: staging
  only:
    - develop
    - main

monitor:metrics:
  stage: monitor
  image: prom/prometheus:latest
  script:
    - echo "Collecting metrics..."
    - promtool check config prometheus.yml
    - promtool query instant http://localhost:9090 'up{job="white-hat-stoat"}'
  only:
    - main

# =====================
# NOTIFICATIONS
# =====================

notify:slack:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - curl -X POST -H 'Content-type: application/json' --data '{"text":"🦡 WHITE-HAT-STOAT Pipeline: $CI_JOB_STATUS\nProject: $CI_PROJECT_NAME\nBranch: $CI_COMMIT_REF_NAME\nCommit: $CI_COMMIT_SHORT_SHA"}' $SLACK_WEBHOOK_URL
  only:
    - main
  when: always